<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageEditor - Demo</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control" />
    <meta content="0" http-equiv="Expires" />
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.0.0/css/fontawesome.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>

<body class="p-1 bg-light">
    <header class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center">Image Editor</h1>
            </div>
        </div>
    </header>
    <main class="container editor-container">
        <div class="row">
            <div class="col-12">
                <div class="upload-area mb-2" id="uploadArea">
                    <div>
                        <h5>Click or Drop an Image Here</h5><small class="text-muted">Supported formats: JPG / PNG / WEBP</small>
                    </div>
                    <input type="file" id="imageInput" accept="image/*" style="display: none;">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col text-center">
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="imageOptions" id="fitImage" autocomplete="off">
                <label class="form-check-label" for="fitImage">Fit Image</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="imageOptions" id="coverCanvas" autocomplete="off">
                    <label class="form-check-label" for="coverCanvas">Cover Canvas</label>
                </div>
                <div class="form-check form-check-inline">
                    <input type="radio" class="form-check-input" name="imageOptions" id="expandCanvas" autocomplete="off" checked>
                    <label class="form-check-label" for="expandCanvas">Expand Canvas</label>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                <!-- Base64 input -->
                <label class="form-label" for="base64Input">Base64 Input:</label>
                <textarea id="base64Input" class="form-control" rows="3" placeholder="Paste data:image/jpeg;base64,..."></textarea>
            </div>
        </div>
        <div class="row mt-2 mb-3">
            <div class="col">
                <button id="loadBtn" class="btn btn-primary">Load image</button>
            </div>            
        </div>
        <!-- Control buttons -->
        <div class="row justify-content-start">
            <div class="col-12 col-md-12 col-lg-4 col-xl-4 col-xxl-4">
                <div class="input-group" role="group" aria-label="Zoom actions">
                    <button class="btn control-button mr-2" id="zoomInBtn" type="button" value="Zoom In">Zoom In</button>
                    <button class="btn control-button mr-2" id="zoomOutBtn" type="button" value="Zoom Out">Zoom Out</button>
                    <input id="scaleRate" class="border text-right px-1" style="width:60px" value="100" readonly><span class="input-group-text">%</span>
                </div>

            </div>
            <div class="col-12 col-md-6 col-lg-4 col-xl-3 col-xxl-3">
                <div class="row">
                    <div class="col-3 col-md-5 col-lg-6 col-xl-6 col-xxl-5">
                        <div class="input-group" role="group" aria-label="Rotate left actions">
                            <button class="btn control-button mr-2" id="rotateLeftBtn" type="button">⟲</button>
                            <input id="leftValue"
                                class="form-control border border-secondary text-right mr-3 px-1 bg-white"
                                style="width:60px" value="90" type="number">
                        </div>
                    </div>
                    <div class="col-3 col-md-5 col-lg-6 col-xl-6 col-xxl-5">
                        <div class="input-group" role="group" aria-label="Rotate right actions">
                            <button class="btn control-button mr-2" id="rotateRightBtn" type="button">⟳</button>
                            <input id="rightValue"
                                class="form-control border border-secondary text-right mr-3 px-1 bg-white"
                                style="width:60px" value="90" type="number">
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4 col-xl-5 col-xxl-4">
                <button class="btn control-button mb-2" id="resetBtn" type="button">Reset View</button>
                <div class="btn-group" role="group" aria-label="History actions">
                    <button id="undoBtn" class="btn control-button mr-2 mb-2">Undo</button>
                    <button id="redoBtn" class="btn control-button mr-2 mb-2">Redo</button>
                </div>
            </div>
        </div>
        <div class="row justify-content-start mb-2">
            <div class="col-12 col-md-7 col-lg-6 col-xl-4 col-xxl-4">
                <div class="btn-group" role="group" aria-label="Mask actions">
                    <button class="btn control-button mr-2 mb-2" id="addMaskBtn" type="button">Add Mask</button>
                    <button class="btn control-button mr-2 mb-2" id="removeMaskBtn" type="button">Remove Mask</button>
                    <button class="btn control-button mr-3 mb-2" id="removeAllMasksBtn" type="button">Remove All Masks</button>
                </div>
            </div>
            <div class="col-12 col-md-5 col-lg-6 col-xl-3 col-xxl-3">
                <div class="btn-group" role="group" aria-label="Crop actions">
                    <button id="cropBtn" class="btn control-button mr-2 mb-2">Crop</button>
                    <button id="applyCropBtn" class="btn control-button mr-2 mb-2">Apply Crop</button>
                    <button id="cancelCropBtn" class="btn control-button mr-2 mb-2">Cancel Crop</button>
                </div>
            </div>
            <div class="col-12 col-md-12 col-xl-5 col-xxl-4">
                <button id="mergeBtn" class="btn control-button mr-2 mb-2">Merge</button>
                <button id="downloadBtn" class="btn control-button mb-2">Download Image</button>
                <button id="base64Btn" class="btn control-button mb-2" onclick="getBase64Action()">Console Base64</button>
            </div>
        </div>

        <!-- Canvas and Mask -->
        <div class="row mb-3">
            <div class="col-12 col-md-10">
                <div id="canvasWrapper">
                    <figure id="imgPlaceholder" class="flex-column justify-content-center align-items-center bg-white d-none" draggable="false">
                        <img class="fa-regular fa-images fa-4x mb-1 text-secondary imgPlaceholderIcon" src="assets/no-images-gray.svg" alt="No images" />
                        <figcaption class="text-secondary user-select-none imgPlaceholderText">No images</figcaption>
                    </figure>
                    <figure id="imageContainer" class="imageContainer transparent">
                        <canvas id="fabricCanvas" aria-label="Editable Image">Editable Image(your browser does not support canvas)</canvas>
                        <figcaption id="canvasCaption" class="visually-hidden">Editable Image</figcaption>
                    </figure>
                </div>
            </div>
            <div class="col-12 col-md-2 mt-2 mt-md-0">
                <div class="maskListContainer d-flex flex-column">
                    <h6 class="p-2 text-center mb-0 border-bottom bg-Light">Mask list</h6>
                    <ul id="maskList" class="list-group flex-fill overflow-auto"></ul>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/fabric@5.5.2/dist/fabric.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@bensitu/image-editor/dist/image-editor.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/fabric@7.2/dist/index.min.js"></script> -->
    <!-- <script src="../src/image-editor.js"></script> -->
    <script src="js/script.js"></script>
</body>

</html>
