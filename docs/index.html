<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageEditor - Demo</title>
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control">
    <meta content="0" http-equiv="Expires">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="demo-shell">
        <header class="demo-header">
            <div>
                <h1>ImageEditor</h1>
                <p>Canvas mask, crop, transform, and export demo</p>
            </div>
            <div class="layout-switcher btn-group" role="group" aria-label="Image layout mode">
                <input type="radio" class="btn-check" name="imageOptions" id="fitImage" autocomplete="off" checked>
                <label class="btn btn-outline-primary" for="fitImage">Fit</label>
                <input type="radio" class="btn-check" name="imageOptions" id="coverCanvas" autocomplete="off">
                <label class="btn btn-outline-primary" for="coverCanvas">Cover</label>
                <input type="radio" class="btn-check" name="imageOptions" id="expandCanvas" autocomplete="off">
                <label class="btn btn-outline-primary" for="expandCanvas">Expand</label>
            </div>
        </header>

        <section class="load-panel" aria-label="Image loading">
            <div class="upload-area" id="uploadArea">
                <strong>Drop image here</strong>
                <span>or click to select JPG, PNG, or WEBP</span>
                <input type="file" id="imageInput" accept="image/*">
            </div>
            <div class="base64-panel">
                <label class="form-label" for="base64Input">Base64 input</label>
                <div class="base64-row">
                    <textarea id="base64Input" class="form-control" rows="2" placeholder="Paste data:image/jpeg;base64,..."></textarea>
                    <button id="loadBtn" class="btn btn-primary" type="button">Load</button>
                </div>
            </div>
        </section>

        <section class="tool-panel" aria-label="Editor controls">
            <div class="tool-group" role="group" aria-label="Zoom actions">
                <button class="btn tool-button icon-button" id="zoomOutBtn" type="button" title="Zoom Out" aria-label="Zoom Out">-</button>
                <div class="scale-readout">
                    <input id="scaleRate" value="100" readonly aria-label="Scale percent">
                    <span>%</span>
                </div>
                <button class="btn tool-button icon-button" id="zoomInBtn" type="button" title="Zoom In" aria-label="Zoom In">+</button>
            </div>

            <div class="tool-group" role="group" aria-label="Rotation actions">
                <button class="btn tool-button icon-button" id="rotateLeftBtn" type="button" title="Rotate Left" aria-label="Rotate Left">CCW</button>
                <input id="leftValue" class="tool-input" value="90" type="number" aria-label="Rotate left degrees">
                <button class="btn tool-button icon-button" id="rotateRightBtn" type="button" title="Rotate Right" aria-label="Rotate Right">CW</button>
                <input id="rightValue" class="tool-input" value="90" type="number" aria-label="Rotate right degrees">
            </div>

            <div class="tool-group" role="group" aria-label="History actions">
                <button class="btn tool-button" id="resetBtn" type="button">Reset</button>
                <button id="undoBtn" class="btn tool-button" type="button">Undo</button>
                <button id="redoBtn" class="btn tool-button" type="button">Redo</button>
            </div>

            <div class="tool-group" role="group" aria-label="Mask actions">
                <button class="btn tool-button" id="addMaskBtn" type="button">Create Mask</button>
                <button class="btn tool-button" id="removeMaskBtn" type="button">Remove</button>
                <button class="btn tool-button" id="removeAllMasksBtn" type="button">Remove All</button>
            </div>

            <div class="tool-group" role="group" aria-label="Crop actions">
                <button id="cropBtn" class="btn tool-button" type="button">Crop</button>
                <button id="applyCropBtn" class="btn tool-button" type="button">Apply</button>
                <button id="cancelCropBtn" class="btn tool-button" type="button">Cancel</button>
            </div>

            <div class="tool-group" role="group" aria-label="Export actions">
                <button id="mergeBtn" class="btn tool-button" type="button">Merge</button>
                <button id="downloadBtn" class="btn tool-button primary-action" type="button">Download</button>
                <button id="base64Btn" class="btn tool-button" type="button" onclick="getBase64Action()">Console Base64</button>
            </div>
        </section>

        <section class="workspace-grid" aria-label="Canvas workspace">
            <div id="canvasWrapper" class="canvas-shell">
                <figure id="imgPlaceholder" class="placeholder-panel flex-column justify-content-center align-items-center" draggable="false">
                    <img class="imgPlaceholderIcon" src="assets/no-images-gray.svg" alt="No images">
                    <figcaption class="imgPlaceholderText">No image loaded</figcaption>
                </figure>
                <figure id="imageContainer" class="imageContainer transparent">
                    <canvas id="fabricCanvas" aria-label="Editable Image">Editable Image(your browser does not support canvas)</canvas>
                    <figcaption id="canvasCaption" class="visually-hidden">Editable Image</figcaption>
                </figure>
            </div>
            <aside class="maskListContainer">
                <h2>Mask list</h2>
                <ul id="maskList" class="list-group"></ul>
            </aside>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/fabric@5.5.2/dist/fabric.min.js"></script>
    <script>
        (function () {
            const imageEditorSources = window.location.hostname.endsWith('github.io')
                ? ['https://cdn.jsdelivr.net/npm/@bensitu/image-editor/dist/image-editor.js']
                : ['../dist/image-editor.js', 'https://cdn.jsdelivr.net/npm/@bensitu/image-editor/dist/image-editor.js'];

            function loadScript(src, onload, onerror) {
                const script = document.createElement('script');
                script.src = src;
                script.onload = onload;
                script.onerror = onerror;
                document.body.appendChild(script);
            }

            function loadDemoScript() {
                loadScript('js/script.js');
            }

            function loadImageEditor(index) {
                if (index >= imageEditorSources.length) return;
                loadScript(
                    imageEditorSources[index],
                    loadDemoScript,
                    () => loadImageEditor(index + 1)
                );
            }

            loadImageEditor(0);
        }());
    </script>
</body>

</html>
