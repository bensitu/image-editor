<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ImageEditor - Demo</title>
        <link rel="icon" href="./favicon.ico" type="image/x-icon" />
        <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
        <meta content="IE=edge" http-equiv="X-UA-Compatible" />
        <meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control" />
        <meta content="0" http-equiv="Expires" />
        <script>
            (function () {
                try {
                    const storedTheme = window.localStorage.getItem('imageEditorDemoTheme');
                    const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
                        ? 'dark'
                        : 'light';
                    document.documentElement.setAttribute(
                        'data-bs-theme',
                        storedTheme || systemTheme,
                    );
                } catch {
                    document.documentElement.setAttribute('data-bs-theme', 'light');
                }
            })();
        </script>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        />
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <main class="demo-shell">
            <header class="demo-header">
                <div>
                    <h1>ImageEditor</h1>
                    <p data-i18n="appSubtitle">Canvas mask, crop, transform, and export demo</p>
                </div>
                <div
                    class="header-actions"
                    aria-label="Demo preferences"
                    data-i18n-aria-label="demoPreferences"
                >
                    <a
                        class="btn legacy-demo-toggle"
                        href="./legacy-v1.html"
                        role="button"
                        data-i18n="legacyDemo"
                    >
                        Legacy v1 demo
                    </a>
                    <label class="theme-switch" for="darkModeToggle" title="Dark mode">
                        <input id="darkModeToggle" type="checkbox" aria-label="Dark mode" />
                        <span class="theme-slider" aria-hidden="true"></span>
                    </label>
                    <div class="language-switcher" role="group" aria-label="Language">
                        <button
                            class="language-button active"
                            type="button"
                            data-language="en"
                            aria-label="English"
                            title="English"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Flag_of_the_United_States.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="zh"
                            aria-label="中文"
                            title="中文"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Flag_of_the_People%27s_Republic_of_China.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="ja"
                            aria-label="日本語"
                            title="日本語"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Flag_of_Japan.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="ko"
                            aria-label="한국어"
                            title="한국어"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/0/09/Flag_of_South_Korea.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="fr"
                            aria-label="Français"
                            title="Français"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="es"
                            aria-label="Español"
                            title="Español"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Flag_of_Spain.svg"
                                alt=""
                            />
                        </button>
                    </div>
                </div>
            </header>

            <section
                class="load-panel"
                aria-label="Image loading"
                data-i18n-aria-label="imageLoading"
            >
                <div
                    class="layout-switcher btn-group"
                    role="group"
                    aria-label="Image layout mode"
                    data-i18n-aria-label="imageLayoutMode"
                >
                    <input
                        type="radio"
                        class="btn-check"
                        name="imageOptions"
                        id="fitImage"
                        autocomplete="off"
                        checked
                    />
                    <label class="btn btn-outline-primary" for="fitImage" data-i18n="fitMode"
                        >Fit</label
                    >
                    <input
                        type="radio"
                        class="btn-check"
                        name="imageOptions"
                        id="coverCanvas"
                        autocomplete="off"
                    />
                    <label class="btn btn-outline-primary" for="coverCanvas" data-i18n="coverMode"
                        >Cover</label
                    >
                    <input
                        type="radio"
                        class="btn-check"
                        name="imageOptions"
                        id="expandCanvas"
                        autocomplete="off"
                    />
                    <label class="btn btn-outline-primary" for="expandCanvas" data-i18n="expandMode"
                        >Expand</label
                    >
                </div>
                <div class="upload-area" id="uploadArea">
                    <strong data-i18n="dropImage">Drop image here</strong>
                    <span data-i18n="selectImageHint"
                        >or click to select JPG, PNG, WEBP, GIF, or BMP</span
                    >
                    <input type="file" id="imageInput" accept="image/*" />
                </div>
                <div class="base64-panel">
                    <label class="form-label" for="base64Input" data-i18n="base64Input"
                        >Base64 input</label
                    >
                    <div class="base64-row">
                        <textarea
                            id="base64Input"
                            class="form-control"
                            rows="2"
                            placeholder="Paste data:image/jpeg;base64,..."
                            data-i18n-placeholder="base64Placeholder"
                        ></textarea>
                        <button
                            id="loadImageButton"
                            class="btn btn-primary"
                            type="button"
                            data-i18n="loadImage"
                        >
                            Load
                        </button>
                    </div>
                    <div id="demoError" class="demo-error" role="alert" hidden></div>
                </div>
            </section>
            <section
                id="messagePanel"
                class="message-panel"
                aria-label="Messages"
                data-i18n-aria-label="messages"
                hidden
            >
                <div id="demoMessage" class="demo-message" role="alert" hidden></div>
            </section>
            <section
                class="workspace-grid"
                aria-label="Canvas workspace"
                data-i18n-aria-label="canvasWorkspace"
            >
                <nav
                    class="tool-panel"
                    aria-label="Editor controls"
                    data-i18n-aria-label="editorControls"
                    role="toolbar"
                    aria-orientation="vertical"
                >
                    <div
                        class="tool-group zoom-group"
                        role="group"
                        aria-label="Zoom actions"
                        data-i18n-aria-label="zoomActions"
                    >
                        <button
                            class="btn tool-button icon-button"
                            id="zoomOutButton"
                            type="button"
                            title="Zoom Out"
                            aria-label="Zoom Out"
                        >
                            <span class="tool-icon" data-lucide="zoom-out" aria-hidden="true"
                                >-</span

                            <span class="tool-label" data-i18n="zoomOut">Zoom Out</span>
                        </button>
                        <div class="scale-readout">
                            <input
                                id="scalePercentageInput"
                                value="100"
                                readonly
                                aria-label="Scale percent"
                                data-i18n-aria-label="scalePercent"
                            />
                            <span>%</span>
                        </div>
                        <button
                            class="btn tool-button icon-button"
                            id="zoomInButton"
                            type="button"
                            title="Zoom In"
                            aria-label="Zoom In"
                        >
                            <span class="tool-icon" data-lucide="zoom-in" aria-hidden="true"
                                >+</span

                            <span class="tool-label" data-i18n="zoomIn">Zoom In</span>
                        </button>
                    </div>

                    <div
                        class="tool-group rotation-group"
                        role="group"
                        aria-label="Rotation actions"

                    >
                        <button
                            class="btn tool-button icon-button"
                            id="rotateLeftButton"

                            title="Rotate Left"

                            <span class="tool-label" data-i18n="rotateLeft">Rotate Left</span>
                        </button>
                        <input
                            id="rotateLeftDegreesInput"
                            class="tool-input"
                            value="90"
                            type="number"
                            aria-label="Rotate left degrees"
                            data-i18n-aria-label="rotateLeftDegrees"
                        />
                        <button
                            class="btn tool-button icon-button"
                            id="rotateRightButton"
                            type="button"
                            title="Rotate Right"
                            aria-label="Rotate Right"
                        >
                            <span class="tool-icon" data-lucide="rotate-cw" aria-hidden="true"
                                >&#10227;</span
                            >
                            <span class="tool-label" data-i18n="rotateRight">Rotate Right</span>
                        </button>
                        <input

                            class="tool-input"
                            value="90"

                        <button id="undoButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="undo-2" aria-hidden="true">U</span>
                            <span class="tool-label" data-i18n="undo">Undo</span>
                        </button>
                        <button id="redoButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="redo-2" aria-hidden="true">R</span>
                            <span class="tool-label" data-i18n="redo">Redo</span>

                        <button id="exitMosaicModeButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="log-out" aria-hidden="true"

                            <span class="tool-label" data-i18n="exitMosaic">Exit Mosaic</span>

                                value="48"

                        <label class="mosaic-control">
                            <span data-i18n="mosaicBlockSize">Block</span>

                                id="mosaicBlockSizeInput"

                                max="40"

                                data-i18n-aria-label="mosaicBlockSize"

                    </div>

                    <div
                        class="tool-group annotation-group"
                        role="group"
                        aria-label="Annotation actions"
                        data-i18n-aria-label="annotationActions"
                    >
                        <button id="enterTextModeButton" class="btn tool-button" type="button">

                            <span class="tool-label" data-i18n="textTool">Text</span>
                        </button>
                        <button id="exitTextModeButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="log-out" aria-hidden="true"
                                >X</span
                            >
                            <span class="tool-label" data-i18n="exitText">Exit Text</span>
                        </button>
                        <label class="mosaic-control">
                            <span data-i18n="textColor">Text color</span>
                            <input id="textColorInput" type="color" value="#ff0000" />
                        </label>
                        <label class="mosaic-control">
                            <span data-i18n="textSize">Text size</span>
                            <input
                                id="textFontSizeInput"
                                type="number"
                                min="8"
                                max="160"
                                value="32"
                            />
                        </label>
                        <button id="enterDrawModeButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="pencil" aria-hidden="true">D</span>
                            <span class="tool-label" data-i18n="drawTool">Draw</span>
                        </button>
                        <button id="exitDrawModeButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="log-out" aria-hidden="true"
                                >X</span
                            >
                            <span class="tool-label" data-i18n="exitDraw">Exit Draw</span>
                        </button>
                        <label class="mosaic-control">
                            <span data-i18n="drawColor">Draw color</span>
                            <input id="drawColorInput" type="color" value="#ff0000" />

                        <label class="mosaic-control">
                            <span data-i18n="drawBrushSize">Brush</span>

                                max="80"
                                value="8"

                            id="removeSelectedAnnotationButton"
                            class="btn tool-button"
                            type="button"
                        >

                                >Remove Annotation</span

                        <button
                            id="removeAllAnnotationsButton"
                            class="btn tool-button"
                            type="button"
                        >

                            <span class="tool-label" data-i18n="removeAllAnnotations"

                    <h2 data-i18n="maskList">Mask list</h2>

                    <h2 data-i18n="annotationList">Annotation list</h2>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/lucide@1.17.0/dist/umd/lucide.min.js"></script>
        <!--
        Fabric.js v7 publishes an ESM browser build. The demo imports it
        explicitly and assigns it to `window.fabric` before loading the
        ImageEditor UMD bundle.
        -->
        <script type="module">
            (async function () {
                const fabricSources = window.location.hostname.endsWith('github.io')
                    ? ['https://cdn.jsdelivr.net/npm/fabric@7.4.0/dist/index.min.mjs']
                    : [
                          '../node_modules/fabric/dist/index.min.mjs',
                          'https://cdn.jsdelivr.net/npm/fabric@7.4.0/dist/index.min.mjs',
                      ];
                // The published UMD bundle is the documented browser entry-point
                // for `@bensitu/image-editor` v2 (registered global: `ImageEditor`).
                const imageEditorSources = window.location.hostname.endsWith('github.io')
                    ? [
                          'https://cdn.jsdelivr.net/npm/@bensitu/image-editor/dist/umd/image-editor.umd.js',
                      ]
                    : [
                          '../dist/umd/image-editor.umd.js',
                          'https://cdn.jsdelivr.net/npm/@bensitu/image-editor/dist/umd/image-editor.umd.js',
                      ];

                window.__imageEditorDemoLoaderErrors = [];
                function recordLoaderError(kind, src, error) {
                    window.__imageEditorDemoLoaderErrors.push({
                        kind,
                        src,
                        name: error?.name,
                        message: error?.message ?? String(error),
                    });
                    console.warn(`[ImageEditor demo] ${kind} source failed`, src, error);
                }

                async function importFirst(sources) {
                    for (const src of sources) {
                        try {
                            return await import(src);
                        } catch (error) {
                            recordLoaderError('Fabric', src, error);
                        }
                    }
                    return null;
                }

                function loadScript(src) {
                    return new Promise((resolve, reject) => {
                        const script = document.createElement('script');
                        script.src = src;
                        script.onload = resolve;
                        script.onerror = reject;
                        document.body.appendChild(script);
                    });
                }

                async function loadFirstScript(sources) {
                    for (const src of sources) {
                        try {
                            await loadScript(src);
                            return true;
                        } catch (error) {
                            recordLoaderError('script', src, error);
                        }
                    }
                    return false;
                }

                if (!window.fabric) {
                    const fabricModule = await importFirst(fabricSources);
                    if (fabricModule) {
                        window.fabric = fabricModule;
                        window.__imageEditorDemoFabricKeys = Object.keys(fabricModule);
                    }
                }
                if (!window.fabric) {
                    console.error('[ImageEditor demo] Fabric could not be loaded.');
                }

                await loadFirstScript(imageEditorSources);
                await loadScript('js/script.js');
            })();
        </script>
    </body>
</html>
