<!doctype html>
<html lang="en" data-bs-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ImageEditor - Legacy v1 Demo</title>
        <link rel="icon" href="./favicon.ico" type="image/x-icon" />
        <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon" />
        <meta content="IE=edge" http-equiv="X-UA-Compatible" />
        <meta content="no-cache, no-store, must-revalidate" http-equiv="Cache-Control" />
        <meta content="0" http-equiv="Expires" />
        <script>
            (function () {
                try {
                    const storedTheme = window.localStorage.getItem('imageEditorDemoTheme');
                    const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches
                        ? 'dark'
                        : 'light';
                    document.documentElement.setAttribute(
                        'data-bs-theme',
                        storedTheme || systemTheme,
                    );
                } catch {
                    document.documentElement.setAttribute('data-bs-theme', 'light');
                }
            })();
        </script>
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        />
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <main class="demo-shell">
            <header class="demo-header">
                <div>
                    <h1>ImageEditor</h1>
                    <p data-i18n="appSubtitle">Canvas mask, crop, transform, and export demo</p>
                </div>
                <div class="header-actions" aria-label="Demo preferences">
                    <a
                        class="btn legacy-demo-toggle"
                        href="./"
                        role="button"
                        aria-pressed="true"
                        data-i18n="usingLegacyDemo"
                    >
                        Using v1
                    </a>
                    <label class="theme-switch" for="darkModeToggle" title="Dark mode">
                        <input id="darkModeToggle" type="checkbox" aria-label="Dark mode" />
                        <span class="theme-slider" aria-hidden="true"></span>
                    </label>
                    <div class="language-switcher" role="group" aria-label="Language">
                        <button
                            class="language-button active"
                            type="button"
                            data-language="en"
                            aria-label="English"
                            title="English"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/a/a4/Flag_of_the_United_States.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="zh"
                            aria-label="中文"
                            title="中文"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Flag_of_the_People%27s_Republic_of_China.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="ja"
                            aria-label="日本語"
                            title="日本語"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Flag_of_Japan.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="ko"
                            aria-label="한국어"
                            title="한국어"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/0/09/Flag_of_South_Korea.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="fr"
                            aria-label="Français"
                            title="Français"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Flag_of_France.svg"
                                alt=""
                            />
                        </button>
                        <button
                            class="language-button"
                            type="button"
                            data-language="es"
                            aria-label="Español"
                            title="Español"
                        >
                            <img
                                src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Flag_of_Spain.svg"
                                alt=""
                            />
                        </button>
                    </div>
                </div>
            </header>

            <section class="load-panel" aria-label="Image loading">
                <div class="layout-switcher btn-group" role="group" aria-label="Image layout mode">
                    <input
                        type="radio"
                        class="btn-check"
                        name="imageOptions"
                        id="fitImage"
                        autocomplete="off"
                        checked
                    />
                    <label class="btn btn-outline-primary" for="fitImage" data-i18n="fitMode"
                        >Fit</label
                    >
                    <input
                        type="radio"
                        class="btn-check"
                        name="imageOptions"
                        id="coverCanvas"
                        autocomplete="off"
                    />
                    <label class="btn btn-outline-primary" for="coverCanvas" data-i18n="coverMode"
                        >Cover</label
                    >
                    <input
                        type="radio"
                        class="btn-check"
                        name="imageOptions"
                        id="expandCanvas"
                        autocomplete="off"
                    />
                    <label class="btn btn-outline-primary" for="expandCanvas" data-i18n="expandMode"
                        >Expand</label
                    >
                </div>
                <div class="upload-area" id="uploadArea">
                    <strong data-i18n="dropImage">Drop image here</strong>
                    <span data-i18n="selectImageHint"
                        >or click to select JPG, PNG, WEBP, GIF, or BMP</span
                    >
                    <input type="file" id="imageInput" accept="image/*" />
                </div>
                <div class="base64-panel">
                    <label class="form-label" for="base64Input" data-i18n="base64Input"
                        >Base64 input</label
                    >
                    <div class="base64-row">
                        <textarea
                            id="base64Input"
                            class="form-control"
                            rows="2"
                            placeholder="Paste data:image/jpeg;base64,..."
                            data-i18n-placeholder="base64Placeholder"
                        ></textarea>
                        <button
                            id="loadImageButton"
                            class="btn btn-primary"
                            type="button"
                            data-i18n="loadImage"
                        >
                            Load
                        </button>
                    </div>
                    <div id="demoError" class="demo-error" role="alert" hidden></div>
                </div>
            </section>
            <section id="messagePanel" class="message-panel" aria-label="Messages" hidden>
                <div id="demoMessage" class="demo-message" role="alert" hidden></div>
            </section>
            <section class="workspace-grid" aria-label="Canvas workspace">
                <nav
                    class="tool-panel"
                    aria-label="Editor controls"
                    role="toolbar"
                    aria-orientation="vertical"
                >
                    <div class="tool-group zoom-group" role="group" aria-label="Zoom actions">
                        <button
                            class="btn tool-button icon-button"
                            id="zoomOutButton"
                            type="button"
                            title="Zoom Out"
                            aria-label="Zoom Out"
                        >
                            <span class="tool-icon" data-lucide="zoom-out" aria-hidden="true"
                                >-</span
                            >
                            <span class="tool-label" data-i18n="zoomOut">Zoom Out</span>
                        </button>
                        <div class="scale-readout">
                            <input
                                id="scalePercentageInput"
                                value="100"
                                readonly
                                aria-label="Scale percent"
                            />
                            <span>%</span>
                        </div>
                        <button
                            class="btn tool-button icon-button"
                            id="zoomInButton"
                            type="button"
                            title="Zoom In"
                            aria-label="Zoom In"
                        >
                            <span class="tool-icon" data-lucide="zoom-in" aria-hidden="true"
                                >+</span
                            >
                            <span class="tool-label" data-i18n="zoomIn">Zoom In</span>
                        </button>
                    </div>

                    <div
                        class="tool-group rotation-group"
                        role="group"
                        aria-label="Rotation actions"
                    >
                        <button
                            class="btn tool-button icon-button"
                            id="rotateLeftButton"
                            type="button"
                            title="Rotate Left"
                            aria-label="Rotate Left"
                        >
                            <span class="tool-icon" data-lucide="rotate-ccw" aria-hidden="true"
                                >&#10226;</span
                            >
                            <span class="tool-label" data-i18n="rotateLeft">Rotate Left</span>
                        </button>
                        <input
                            id="rotateLeftDegreesInput"
                            class="tool-input"
                            value="90"
                            type="number"
                            aria-label="Rotate left degrees"
                        />
                        <button
                            class="btn tool-button icon-button"
                            id="rotateRightButton"
                            type="button"
                            title="Rotate Right"
                            aria-label="Rotate Right"
                        >
                            <span class="tool-icon" data-lucide="rotate-cw" aria-hidden="true"
                                >&#10227;</span
                            >
                            <span class="tool-label" data-i18n="rotateRight">Rotate Right</span>
                        </button>
                        <input
                            id="rotateRightDegreesInput"
                            class="tool-input"
                            value="90"
                            type="number"
                            aria-label="Rotate right degrees"
                        />
                    </div>

                    <div class="tool-group history-group" role="group" aria-label="History actions">
                        <button
                            class="btn tool-button"
                            id="resetImageTransformButton"
                            type="button"
                        >
                            <span class="tool-icon" data-lucide="refresh-cw" aria-hidden="true"
                                >R</span
                            >
                            <span class="tool-label" data-i18n="resetTransform">Reset</span>
                        </button>
                        <button id="undoButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="undo-2" aria-hidden="true">U</span>
                            <span class="tool-label" data-i18n="undo">Undo</span>
                        </button>
                        <button id="redoButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="redo-2" aria-hidden="true">R</span>
                            <span class="tool-label" data-i18n="redo">Redo</span>
                        </button>
                    </div>

                    <div class="tool-group mask-group" role="group" aria-label="Mask actions">
                        <select
                            id="maskShapeSelect"
                            class="tool-select form-select form-select-sm"
                            aria-label="Mask shape"
                        >
                            <option value="rect" data-i18n="maskShapeRect">Rect</option>
                            <option value="circle" data-i18n="maskShapeCircle">Circle</option>
                            <option value="ellipse" data-i18n="maskShapeEllipse">Ellipse</option>
                            <option value="polygon" data-i18n="maskShapePolygon">Polygon</option>
                        </select>
                        <button class="btn tool-button" id="createMaskButton" type="button">
                            <span class="tool-icon" data-lucide="square-plus" aria-hidden="true"
                                >+</span
                            >
                            <span class="tool-label" data-i18n="createMask">Create Mask</span>
                        </button>
                        <button class="btn tool-button" id="removeSelectedMaskButton" type="button">
                            <span class="tool-icon" data-lucide="trash-2" aria-hidden="true"
                                >-</span
                            >
                            <span class="tool-label" data-i18n="removeMask">Remove</span>
                        </button>
                        <button class="btn tool-button" id="removeAllMasksButton" type="button">
                            <span class="tool-icon" data-lucide="trash" aria-hidden="true">X</span>
                            <span class="tool-label" data-i18n="removeAllMasks">Remove All</span>
                        </button>
                    </div>

                    <div class="tool-group crop-group" role="group" aria-label="Crop actions">
                        <button id="enterCropModeButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="crop" aria-hidden="true">C</span>
                            <span class="tool-label" data-i18n="crop">Crop</span>
                        </button>
                        <button id="applyCropButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="check" aria-hidden="true">OK</span>
                            <span class="tool-label" data-i18n="apply">Apply</span>
                        </button>
                        <button id="cancelCropButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="x" aria-hidden="true">X</span>
                            <span class="tool-label" data-i18n="cancel">Cancel</span>
                        </button>
                    </div>

                    <div class="tool-group export-group" role="group" aria-label="Export actions">
                        <button id="mergeMasksButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="layers" aria-hidden="true">M</span>
                            <span class="tool-label" data-i18n="mergeMasks">Merge</span>
                        </button>
                        <button id="downloadImageButton" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="download" aria-hidden="true"
                                >D</span
                            >
                            <span class="tool-label" data-i18n="download">Download</span>
                        </button>
                        <button id="base64Button" class="btn tool-button" type="button">
                            <span class="tool-icon" data-lucide="terminal" aria-hidden="true"
                                >64</span
                            >
                            <span class="tool-label" data-i18n="consoleBase64">Console Base64</span>
                        </button>
                    </div>
                </nav>
                <div id="canvasWrapper" class="canvas-shell">
                    <figure
                        id="imagePlaceholder"
                        class="placeholder-panel flex-column justify-content-center align-items-center"
                        draggable="false"
                    >
                        <img
                            class="imagePlaceholderIcon"
                            src="assets/no-images-gray.svg"
                            alt="No images"
                        />
                        <figcaption class="imagePlaceholderText" data-i18n="noImageLoaded">
                            No image loaded
                        </figcaption>
                    </figure>
                    <figure id="imageContainer" class="imageContainer transparent">
                        <canvas id="canvas" aria-label="Editable Image"
                            >Editable Image(your browser does not support canvas)</canvas
                        >
                        <figcaption id="canvasCaption" class="visually-hidden">
                            Editable Image
                        </figcaption>
                    </figure>
                </div>
                <aside class="maskListContainer">
                    <h2 data-i18n="maskList">Mask list</h2>
                    <ul id="maskList" class="list-group"></ul>
                </aside>
            </section>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/lucide@1.17.0/dist/umd/lucide.min.js"></script>
        <!-- The legacy demo is isolated on its own page so Fabric v5 and v7 never share a global. -->
        <script src="https://cdn.jsdelivr.net/npm/fabric@5.5.2/dist/fabric.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@bensitu/image-editor@1.5.2/dist/image-editor.min.js"></script>
        <script src="js/legacy-v1.js"></script>
    </body>
</html>
