name: Deploy demo to GitHub Pages

on:
    push:
        branches: [main]
        paths:
            - 'docs/**'
            - 'dist/**'
            - '.github/workflows/deploy-pages.yml'
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        name: Package demo site
        runs-on: ubuntu-latest
        outputs:
            pages_artifact_name: ${{ steps.pages_artifact.outputs.name }}

        steps:
            - name: Check out repository
              uses: actions/checkout@v6

            - name: Verify demo entrypoint
              run: test -f docs/index.html

            - name: Resolve Pages artifact name
              id: pages_artifact
              shell: bash
              run: echo "name=github-pages-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v5
              with:
                  name: ${{ steps.pages_artifact.outputs.name }}
                  path: docs

    deploy:
        name: Deploy demo site
        needs: build
        runs-on: ubuntu-latest
        permissions:
            pages: write
            id-token: write
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5
              with:
                  artifact_name: ${{ needs.build.outputs.pages_artifact_name }}
