name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Package semantic version to publish. Prefix with v is optional.'
        required: true
        type: string
      npm_tag:
        description: 'npm dist-tag to publish with'
        required: false
        default: 'latest'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build, test, and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.14.0
          registry-url: https://registry.npmjs.org

      - name: Use npm with trusted publishing support
        run: npm install -g npm@^11.5.1

      - name: Install native canvas dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm install --include=optional

      - name: Validate package version
        shell: bash
        env:
          RELEASE_TAG_NAME: ${{ github.event.release.tag_name }}
          WORKFLOW_VERSION: ${{ github.event.inputs.version }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Package version: ${PACKAGE_VERSION}"

          EXPECTED_VERSION="${RELEASE_TAG_NAME:-${WORKFLOW_VERSION}}"
          EXPECTED_VERSION="${EXPECTED_VERSION#v}"

          if [[ -z "${EXPECTED_VERSION}" ]]; then
            echo "A release tag or workflow version is required." >&2
            exit 1
          fi

          if [[ "${PACKAGE_VERSION}" != "${EXPECTED_VERSION}" ]]; then
            echo "package.json version (${PACKAGE_VERSION}) must match release version (${EXPECTED_VERSION})." >&2
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check npm version availability
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm." >&2
            exit 1
          fi

      - name: Publish to npm
        shell: bash
        env:
          WORKFLOW_NPM_TAG: ${{ github.event.inputs.npm_tag }}
        run: |
          NPM_TAG="${WORKFLOW_NPM_TAG:-latest}"
          npm publish --access public --tag "${NPM_TAG}"
