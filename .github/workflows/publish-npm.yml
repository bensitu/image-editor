name: Publish npm package

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Package semantic version to publish. Prefix with v is optional.'
                required: true
                type: string
            npm_tag:
                description: 'npm dist-tag to publish with'
                required: true
                type: string

permissions:
    contents: read
    id-token: write

concurrency:
    group: npm-publish-${{ github.event.inputs.version }}
    cancel-in-progress: false

jobs:
    publish:
        name: Publish release artifact
        runs-on: ubuntu-latest
        environment:
            name: npm

        steps:
            - name: Check out repository
              uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

            - name: Set up Node.js
              uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
              with:
                  node-version: '24.x'
                  registry-url: https://registry.npmjs.org

            - name: Use npm with trusted publishing support
              run: npm install -g npm@11.5.1

            - name: Validate requested version
              shell: bash
              run: |
                  VERSION="${{ github.event.inputs.version }}"
                  VERSION="${VERSION#v}"

                  if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
                    echo "Version must be a semantic version. Prefix with v is optional." >&2
                    exit 1
                  fi

                  {
                    echo "VERSION=${VERSION}"
                    echo "TAG_NAME=v${VERSION}"
                  } >> "${GITHUB_ENV}"

            - name: Validate npm dist-tag policy
              run: >-
                  node scripts/publish-release-artifacts.mjs
                  --check-tag "${VERSION}" "${{ github.event.inputs.npm_tag }}"

            - name: Download release artifact
              shell: bash
              run: |
                  IS_DRAFT="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft')"
                  if [[ "${IS_DRAFT}" != "false" ]]; then
                    echo "Release ${TAG_NAME} must be published before publishing to npm." >&2
                    exit 1
                  fi

                  rm -f ./*.tgz ./*.sha256
                  gh release download "${TAG_NAME}" --pattern '*.tgz' --pattern '*.sha256' --clobber

                  shopt -s nullglob
                  PACKAGE_TARBALLS=(*.tgz)
                  PACKAGE_CHECKSUMS=(*.sha256)
                  if [[ "${#PACKAGE_TARBALLS[@]}" -ne 2 || "${#PACKAGE_CHECKSUMS[@]}" -ne 2 ]]; then
                    echo "Release ${TAG_NAME} must contain the main and Codemod tarballs with two checksums." >&2
                    exit 1
                  fi

                  for PACKAGE_CHECKSUM in "${PACKAGE_CHECKSUMS[@]}"; do
                    sha256sum -c "${PACKAGE_CHECKSUM}"
                  done
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}

            - name: Validate release artifacts metadata
              shell: bash
              run: |
                  MAIN_PACKAGE_NAME='@bensitu/image-editor'
                  CODEMOD_PACKAGE_NAME='@bensitu/image-editor-codemod'
                  MAIN_PACKAGE_TARBALL=''
                  CODEMOD_PACKAGE_TARBALL=''

                  for PACKAGE_TARBALL in ./*.tgz; do
                    PACKAGE_JSON="$(tar -xOf "${PACKAGE_TARBALL}" package/package.json)"
                    PACKAGE_NAME="$(
                      node -e 'console.log(JSON.parse(process.argv[1]).name)' "${PACKAGE_JSON}"
                    )"
                    PACKAGE_VERSION="$(
                      node -e 'console.log(JSON.parse(process.argv[1]).version)' "${PACKAGE_JSON}"
                    )"

                    echo "Package: ${PACKAGE_NAME}@${PACKAGE_VERSION} (${PACKAGE_TARBALL})"
                    if [[ "${PACKAGE_VERSION}" != "${VERSION}" ]]; then
                      echo "Package artifact version (${PACKAGE_VERSION}) must match requested version (${VERSION})." >&2
                      exit 1
                    fi

                    case "${PACKAGE_NAME}" in
                      "${MAIN_PACKAGE_NAME}")
                        if [[ -n "${MAIN_PACKAGE_TARBALL}" ]]; then
                          echo "The release contains a duplicate main package artifact." >&2
                          exit 1
                        fi
                        MAIN_PACKAGE_TARBALL="${PACKAGE_TARBALL}"
                        ;;
                      "${CODEMOD_PACKAGE_NAME}")
                        if [[ -n "${CODEMOD_PACKAGE_TARBALL}" ]]; then
                          echo "The release contains a duplicate Codemod package artifact." >&2
                          exit 1
                        fi
                        CODEMOD_PACKAGE_TARBALL="${PACKAGE_TARBALL}"
                        ;;
                      *)
                        echo "Unexpected package artifact: ${PACKAGE_NAME}." >&2
                        exit 1
                        ;;
                    esac
                  done

                  if [[ -z "${MAIN_PACKAGE_TARBALL}" || -z "${CODEMOD_PACKAGE_TARBALL}" ]]; then
                    echo "The release must contain both package artifacts." >&2
                    exit 1
                  fi

                  {
                    printf '%s\t%s\t%s\n' \
                      "${CODEMOD_PACKAGE_TARBALL}" "${CODEMOD_PACKAGE_NAME}" "${VERSION}"
                    printf '%s\t%s\t%s\n' \
                      "${MAIN_PACKAGE_TARBALL}" "${MAIN_PACKAGE_NAME}" "${VERSION}"
                  } > package-artifacts.tsv

            - name: Publish or verify release artifacts on npm
              run: >-
                  node scripts/publish-release-artifacts.mjs
                  --publish package-artifacts.tsv "${{ github.event.inputs.npm_tag }}"
