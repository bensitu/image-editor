name: CI

on:
    pull_request:
        branches:
            - main
            - develop
    push:
        branches:
            - main
            - develop

permissions:
    contents: read

jobs:
    pull-request-gate:
        name: Pull-request gate (Node 24, Chromium)
        runs-on: ubuntu-latest

        steps:
            - name: Check out repository
              uses: actions/checkout@v7

            - name: Set up Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: '24.x'
                  cache: npm
                  cache-dependency-path: |
                      package-lock.json
                      examples/next-client-only/package-lock.json

            - name: Install native canvas dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    build-essential \
                    libcairo2-dev \
                    libpango1.0-dev \
                    libjpeg-dev \
                    libgif-dev \
                    librsvg2-dev

            - name: Install dependencies
              run: npm ci

            - name: Install Chromium
              run: npx playwright install --with-deps chromium

            - name: Run pull-request gate
              run: npm run check:pr
