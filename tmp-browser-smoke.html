<!doctype html>
<html>
<body>
<div id="placeholder"></div>
<div id="wrap"><canvas id="c"></canvas></div>
<button id="addMaskBtn"></button>
<button id="mergeBtn"></button>
<button id="downloadBtn"></button>
<button id="cropBtn"></button>
<button id="applyCropBtn"></button>
<button id="cancelCropBtn"></button>
<button id="removeMaskBtn"></button>
<button id="removeAllMasksBtn"></button>
<button id="zoomInBtn"></button>
<button id="zoomOutBtn"></button>
<button id="resetBtn"></button>
<button id="undoBtn"></button>
<button id="redoBtn"></button>
<input id="scaleRate">
<input id="rotationLeftInput">
<input id="rotationRightInput">
<input id="imageInput">
<ul id="maskList"></ul>
<script src="/node_modules/fabric/dist/index.min.js"></script>
<script src="/dist/umd/image-editor.umd.js"></script>
<script>
window.smokeResult = { loaded: false, error: null };
try {
    const Ctor = window.ImageEditor.ImageEditor || window.ImageEditor;
    const editor = new Ctor({
        canvasWidth: 80,
        canvasHeight: 60,
        fitImageToCanvas: true,
        expandCanvasToImage: false,
        animationDuration: 0,
        showPlaceholder: false
    });
    editor.init({
        canvas: 'c',
        imgPlaceholder: 'placeholder',
        canvasContainer: 'wrap',
        addMaskBtn: 'addMaskBtn',
        mergeBtn: 'mergeBtn',
        downloadBtn: 'downloadBtn',
        cropBtn: 'cropBtn',
        applyCropBtn: 'applyCropBtn',
        cancelCropBtn: 'cancelCropBtn',
        removeMaskBtn: 'removeMaskBtn',
        removeAllMasksBtn: 'removeAllMasksBtn',
        zoomInBtn: 'zoomInBtn',
        zoomOutBtn: 'zoomOutBtn',
        resetBtn: 'resetBtn',
        undoBtn: 'undoBtn',
        redoBtn: 'redoBtn',
        scaleRate: 'scaleRate',
        rotationLeftInput: 'rotationLeftInput',
        rotationRightInput: 'rotationRightInput',
        imageInput: 'imageInput',
        maskList: 'maskList'
    });
    window.editor = editor;
    window.smokeResult = {
        loaded: true,
        hasFabric: !!window.fabric,
        hasImageEditor: !!window.ImageEditor,
        isImageLoaded: editor.isImageLoaded()
    };
} catch (error) {
    window.smokeResult = {
        loaded: false,
        error: String(error && error.message || error)
    };
}
</script>
</body>
</html>
