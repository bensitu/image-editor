<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Image Editor Core example</title>
        <script type="module" src="/src/main.ts"></script>
    </head>
    <body>
        <main>
            <h1>Core + Plugins</h1>
            <div class="toolbar">
                <input id="image-input" type="file" accept="image/png,image/jpeg,image/webp" />
                <button id="rotate" type="button">Rotate</button>
                <button id="undo" type="button">Undo</button>
                <button id="export" type="button">Export PNG</button>
            </div>
            <p id="status" role="status">Initializing…</p>
            <div id="editor-container" class="editor-container">
                <canvas id="editor-canvas"></canvas>
            </div>
        </main>
    </body>
</html>
